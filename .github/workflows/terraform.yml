name: Provision Infrastructure (Terraform)

# Manual trigger only — infra changes should be deliberate
# Also runs on push to terraform/ files for plan preview (but not auto-apply)
on:
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action to run"
        required: true
        default: "plan"
        type: choice
        options:
          - plan
          - apply
          - destroy
  push:
    branches:
      - main
    paths:
      - "terraform/**"

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
  TF_VAR_region: ${{ secrets.GCP_REGION }}
  TF_VAR_db_password: ${{ secrets.DB_PASS }}

jobs:
  terraform:
    name: Terraform ${{ github.event.inputs.action || 'plan' }}
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write
      # Needed to post plan output as a PR comment
      pull-requests: write

    defaults:
      run:
        working-directory: terraform

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Authenticate to GCP ────────────────────────────────────────
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      # ── 3. Set up Terraform ───────────────────────────────────────────
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.8.0"

      # ── 4. Terraform Init ─────────────────────────────────────────────
      - name: Terraform Init
        run: terraform init

      # ── 5. Terraform Format Check ─────────────────────────────────────
      - name: Terraform Format Check
        run: terraform fmt -check
        continue-on-error: true

      # ── 6. Terraform Plan ─────────────────────────────────────────────
      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -out=tfplan
        continue-on-error: true

      # ── 7. Apply or Destroy (only on manual workflow_dispatch) ────────
      - name: Terraform Apply
        if: github.event.inputs.action == 'apply'
        run: terraform apply -auto-approve tfplan

      - name: Terraform Destroy
        if: github.event.inputs.action == 'destroy'
        run: terraform destroy -auto-approve
