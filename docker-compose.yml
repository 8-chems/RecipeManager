version: "3.9"

services:
  # ─────────────────────────────────────────────
  # PostgreSQL (local stand-in for Cloud SQL)
  # ─────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: recipe_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: PgSecurePassw0rdRecipe
      POSTGRES_DB: recipedb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # Node.js Express Backend API
  # ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: recipe_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 5000
      NODE_ENV: development
      DB_USER: postgres
      DB_PASS: PgSecurePassw0rdRecipe
      DB_NAME: recipedb
      DB_HOST: postgres   # connects to the docker service name above
      DB_PORT: 5432
      # Set your real GCP values below for cloud integrations testing
      GCP_PROJECT_ID: ${GCP_PROJECT_ID:-}
      GCS_BUCKET_NAME: ${GCS_BUCKET_NAME:-}
      BQ_DATASET_NAME: recipe_analytics
      # Mount the host credentials.json if available
      GOOGLE_APPLICATION_CREDENTIALS: /run/secrets/gcp_credentials
    ports:
      - "5000:5000"
    secrets:
      - gcp_credentials

  # ─────────────────────────────────────────────
  # Vite React Frontend
  # ─────────────────────────────────────────────
  frontend:
    image: node:20-alpine
    container_name: recipe_frontend
    environment:
      - VITE_PROXY_TARGET=http://backend:5000
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:

# Docker secrets allow safe injection of the GCP credentials JSON
secrets:
  gcp_credentials:
    file: ./credentials.json
