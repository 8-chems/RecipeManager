name: Deploy Backend to Cloud Run

# Trigger on every push to the main branch that touches backend files
on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/backend-deploy.yml"

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: ${{ secrets.GCP_REGION }}          # e.g. us-central1
  SERVICE_NAME: recipe-backend
  REGISTRY: us-central1-docker.pkg.dev       # Artifact Registry host
  REPO_NAME: recipe-manager                  # Artifact Registry repo name

jobs:
  build-and-deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest

    # Allows this workflow to request a short-lived OIDC token from GitHub
    # so it can authenticate with GCP without storing long-lived keys.
    permissions:
      contents: read
      id-token: write

    steps:
      # ── 1. Checkout source ────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Authenticate to GCP via Workload Identity Federation ───────
      # This is the recommended zero-secret approach.
      # See README section "CI/CD — GCP Workload Identity Setup" for setup.
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      # ── 3. Set up Cloud SDK ───────────────────────────────────────────
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # ── 4. Configure Docker to push to Artifact Registry ─────────────
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      # ── 5. Build the Docker image ─────────────────────────────────────
      - name: Build Docker image
        run: |
          docker build \
            -t ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.SERVICE_NAME }}:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.SERVICE_NAME }}:latest \
            ./backend

      # ── 6. Push to Artifact Registry ─────────────────────────────────
      - name: Push image to Artifact Registry
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.SERVICE_NAME }}:latest

      # ── 7. Deploy to Cloud Run ────────────────────────────────────────
      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
          # All sensitive values come from GitHub Secrets — never hardcoded
          env_vars: |
            NODE_ENV=production
            GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}
            GCS_BUCKET_NAME=${{ secrets.GCS_BUCKET_NAME }}
            BQ_DATASET_NAME=${{ secrets.BQ_DATASET_NAME }}
            DB_USER=${{ secrets.DB_USER }}
            DB_NAME=${{ secrets.DB_NAME }}
            DB_HOST=/cloudsql/${{ secrets.CLOUD_SQL_CONNECTION_NAME }}
          secrets: |
            DB_PASS=recipe-db-password:latest
          # Mount Cloud SQL socket
          flags: >-
            --allow-unauthenticated
            --add-cloudsql-instances=${{ secrets.CLOUD_SQL_CONNECTION_NAME }}
            --service-account=${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      # ── 8. Print the deployed URL ─────────────────────────────────────
      - name: Output deployed URL
        run: echo "✅ Backend deployed to ${{ steps.deploy.outputs.url }}"
